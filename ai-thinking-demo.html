<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Deep Thinking Stream Demo</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg1: #0e1014;
      --bg2: #1a1d24;
      --panel: rgba(25, 28, 36, 0.82);
      --panel-border: rgba(255,255,255,0.08);
      --text-main: rgba(255,255,255,0.94);
      --text-sub: rgba(255,255,255,0.68);
      --text-dim: rgba(255,255,255,0.48);
      --accent: #ffffff;
      --ok: #47d37b;
      --cursor: rgba(255,255,255,0.95);
      --glow: rgba(255,255,255,0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.08), rgba(255,255,255,0) 28%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.06), rgba(255,255,255,0) 34%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      padding: 24px;
    }

    .shell {
      width: min(520px, 92vw);
      display: grid;
      gap: 14px;
    }

    .panel {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      padding: 18px 18px 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(16px);
      box-shadow:
        0 20px 40px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: auto -10% -24px -10%;
      height: 80px;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), rgba(255,255,255,0));
      filter: blur(12px);
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      position: relative;
      flex: 0 0 auto;
      box-shadow: 0 0 18px rgba(255,255,255,0.12);
    }

    .logo i,
    .logo::before,
    .logo::after {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      border-radius: 999px;
      background: #0f1115;
      animation: logoBars 1.15s ease-in-out infinite;
    }

    .logo::before { left: 7px; height: 8px; animation-delay: 0s; }
    .logo i { left: 11px; height: 14px; animation-delay: 0.14s; }
    .logo::after { left: 15px; height: 10px; animation-delay: 0.28s; }

    @keyframes logoBars {
      0%, 100% { transform: translateY(-50%) scaleY(0.8); opacity: 0.75; }
      50% { transform: translateY(-50%) scaleY(1.15); opacity: 1; }
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: 0.2px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-main);
    }

    .title-dots {
      display: inline-flex;
      gap: 2px;
    }

    .title-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.78);
      animation: dot 1.2s ease-in-out infinite;
    }

    .title-dots span:nth-child(2) { animation-delay: 0.18s; }
    .title-dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes dot {
      0%, 80%, 100% { opacity: 0.22; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    .sub-title {
      margin-top: 3px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .steps {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 24px;
      font-size: 14px;
      color: var(--text-sub);
    }

    .step.done { color: rgba(255,255,255,0.72); }
    .step.active { color: var(--text-main); }

    .step-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      position: relative;
    }

    .step.done .step-icon {
      border-radius: 50%;
      background: rgba(71, 211, 123, 0.16);
      border: 1px solid rgba(71, 211, 123, 0.34);
    }

    .step.done .step-icon::after {
      content: "✓";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--ok);
      font-size: 12px;
      font-weight: 700;
    }

    .step.active .step-icon {
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.22);
      border-top-color: rgba(255,255,255,0.95);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .thinking-board {
      position: relative;
      min-height: 92px;
      border-radius: 16px;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .thinking-board::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 10px;
      height: 12px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      filter: blur(10px);
      opacity: 0.5;
      animation: shimmer 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%, 100% { transform: translateX(-6px); opacity: 0.22; }
      50% { transform: translateX(6px); opacity: 0.68; }
    }

    .thinking-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 0 0 0 rgba(255,255,255,0.28);
      animation: pulse 1.4s ease-out infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.28); opacity: 1; }
      70% { box-shadow: 0 0 0 10px rgba(255,255,255,0); opacity: 0.8; }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); opacity: 0.8; }
    }

    .line-wrap {
      position: relative;
      min-height: 34px;
      display: flex;
      align-items: center;
    }

    .line {
      font-size: 18px;
      line-height: 1.6;
      font-weight: 500;
      letter-spacing: 0.2px;
      color: rgba(255,255,255,0.96);
      text-shadow: 0 0 10px rgba(255,255,255,0.06);
      word-break: break-all;
      transition: opacity 0.14s ease, transform 0.14s ease;
    }

    .line.switching {
      opacity: 0.18;
      transform: translateY(-2px);
    }

    .cursor {
      display: inline-block;
      width: 10px;
      color: var(--cursor);
      animation: cursorBlink 0.72s step-end infinite;
    }

    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.18; }
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      gap: 12px;
    }

    .meta {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .ghost-btn {
      min-width: 76px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.88);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .ghost-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .test-panel {
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-sub);
    }

    .test-title {
      color: var(--text-main);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chip {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .chip:hover, .chip.active {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.22);
    }

    .test-desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="header">
        <div class="logo"><i></i></div>
        <div>
          <div class="title-row">
            <div class="title"></div>
            <div class="title-dots"><span></span><span></span><span></span></div>
          </div>
          <div class="sub-title"></div>
        </div>
      </div>

      <div class="steps">
        <div class="step done">
          <div class="step-icon"></div>
          <div>理解需求</div>
        </div>
        <div class="step done">
          <div class="step-icon"></div>
          <div>搜集灵感</div>
        </div>
        <div class="step active">
          <div class="step-icon"></div>
          <div></div>
        </div>
      </div>

      <div class="thinking-board">
        <div class="thinking-label">
          <span class="pulse-dot"></span>
          <span>AI 正在深度思考中</span>
        </div>
        <div class="line-wrap">
          <div class="line" id="thinkingLine"></div>
        </div>
      </div>

      <div class="footer">
        <div class="meta" id="testMeta">测试模式：标准节奏</div>
        <button class="ghost-btn">取消</button>
      </div>
    </div>

    <div class="test-panel">
      <div class="test-title">测试案例</div>
      <div class="controls" id="caseControls"></div>
      <div class="test-desc" id="testDesc"></div>
    </div>
  </div>

  <script>
    const thinkingLine = document.getElementById('thinkingLine');
    const testMeta = document.getElementById('testMeta');
    const caseControls = document.getElementById('caseControls');
    const testDesc = document.getElementById('testDesc');

    const cases = {
      normal: {
        label: '标准节奏',
        desc: '推荐默认方案。单句显示、逐字输出、完成后快速切换到下一句，适合正式测试。',
        charInterval: 16,
        holdAfterComplete: 60,
        switchGap: 40,
        sentences: [
          '正在分析你偏好的车身视觉风格',
          '正在匹配更适合整车比例的图案布局',
          '正在平衡个性表达与整体协调感',
          '正在生成第一版车衣设计方案',
          '正在优化颜色层次与边缘细节'
        ]
      },
      fast: {
        label: '高频忙碌感',
        desc: '更快的打印速度和更短的停留时间，突出 AI 很忙、一直在切句思考的感觉。',
        charInterval: 28,
        holdAfterComplete: 80,
        switchGap: 70,
        sentences: [
          '正在理解你想要的科技感与辨识度',
          '正在筛选更适合当前车型的设计方向',
          '正在组合颜色关系与图案节奏',
          '正在快速生成候选方案'
        ]
      },
      long: {
        label: '长句压力测试',
        desc: '验证长内容下的逐字输出、换行表现和整体节奏是否仍然清晰稳定。',
        charInterval: 36,
        holdAfterComplete: 160,
        switchGap: 100,
        sentences: [
          '正在根据你的描述，分析更适合这台车的整体视觉风格、色彩方向和图案分布逻辑',
          '正在匹配既能体现个性表达，又不会破坏整车协调感的车衣设计方案',
          '正在结合车身结构、视觉重心和大面积贴覆效果优化最终呈现'
        ]
      },
      mixed: {
        label: '长短句混合',
        desc: '验证真实场景下不同长度句子连续切换时，视觉节奏是否自然。',
        charInterval: 34,
        holdAfterComplete: 120,
        switchGap: 90,
        sentences: [
          '正在理解你的需求',
          '正在分析风格倾向与颜色偏好',
          '正在匹配更适合整车比例的图案布局',
          '正在生成方案',
          '正在优化整体层次与完成度'
        ]
      }
    };

    let runId = 0;
    let currentCaseKey = 'normal';

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function setActiveCase(caseKey) {
      currentCaseKey = caseKey;
      const config = cases[caseKey];
      testMeta.textContent = `测试模式：${config.label}`;
      testDesc.textContent = config.desc;

      [...caseControls.querySelectorAll('.chip')].forEach(btn => {
        btn.classList.toggle('active', btn.dataset.case === caseKey);
      });

      runId += 1;
      playCase(config, runId);
    }

    async function typeSentence(text, config, localRunId) {
      thinkingLine.classList.remove('switching');
      thinkingLine.innerHTML = '';

      for (let i = 0; i <= text.length; i++) {
        if (localRunId !== runId) return false;
        const visible = text.slice(0, i);
        const cursor = '<span class="cursor">▋</span>';
        thinkingLine.innerHTML = visible + cursor;
        await sleep(config.charInterval);
      }

      if (localRunId !== runId) return false;
      thinkingLine.innerHTML = text + '<span class="cursor">▋</span>';
      await sleep(config.holdAfterComplete);
      return true;
    }

    async function switchSentence(config, localRunId) {
      if (localRunId !== runId) return false;
      thinkingLine.classList.add('switching');
      await sleep(config.switchGap);
      return localRunId === runId;
    }

    async function playCase(config, localRunId) {
      let index = 0;
      while (localRunId === runId) {
        const text = config.sentences[index % config.sentences.length];
        const ok = await typeSentence(text, config, localRunId);
        if (!ok) return;
        const canContinue = await switchSentence(config, localRunId);
        if (!canContinue) return;
        index += 1;
      }
    }

    function buildControls() {
      Object.entries(cases).forEach(([key, config]) => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.dataset.case = key;
        btn.textContent = config.label;
        btn.addEventListener('click', () => setActiveCase(key));
        caseControls.appendChild(btn);
      });
    }

    buildControls();
    setActiveCase('normal');
  </script>
</body>
</html>
